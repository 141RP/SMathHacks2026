version: "3.9"

services:
  reefsync-db:
    image: postgis/postgis:16-3.4
    container_name: reefsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: reefsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - reefsync_pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  reefsync_pgdata:
